</head>
<body>
  <div class="topbar">
    <a href="/index.html" class="logo"><img src="/logo.png" alt="Masjid Ar-Rahman" /></a>
    <nav class="nav">
      <a href="/index.html" class="nav-link active">Utama</a>
      <a href="/about.html" class="nav-link">Media</a>
      <a href="/contact.html" class="nav-link">Hubungi Kami</a>

  </div>

  <header style="min-height: 650px;">
    <h1>MASJID AR-RAHMAN KG. SG. TAPAH MANJOI</h1>
  </header>

  
    <section class="menu-section">
      <h2>Menu Utama</h2>
      <div class="menu-grid">
        <a href="/prayer-times.html" class="menu-btn">Waktu<br></L>Solat</a>
        <a href="/events.html" class="menu-btn">Program<br>Masjid</a>
        <a href="/donate.html" class="menu-btn">Infaq<br>Online</a>
        <a href="/upgrade.html" class="menu-btn">Penambahbaikan<br> Masjid</a>
        <a href="/nikah.html" class="menu-btn">Urusan<br>Pernikahan</a>
      </div>

    </section>
    </main>
     <section class="announcement-section">
      <h2>Pengumuman</h2>
        <div class="poster-box">
        <h3>JADUAL KULIAH SUBUH DAN MAGHRIB BAGI BULAN JULAI 2026</h3>
        <img src="/announcement-poster.jpeg" alt="This month's activity poster" class="announcement-poster" onerror="this.style.display='none'" />
        </div>
      <div class="announcement-list">
        <!-- <div class="announcement-item">
          <p>Edit this section in <code>index.html</code> to post your latest announcements here.</p>
        </div> -->
      </div>
    </section>

    <div id="gallery" class="gallery"></div>
  </main>

  <script>
    fetch('/api/photos')
      .then((res) => res.json())
      .then((photos) => {
        const gallery = document.getElementById('gallery');
        const emptyMsg = document.getElementById('empty-msg');

        if (photos.length === 0) {
          emptyMsg.style.display = 'block';
          return;
        }

        photos.forEach((filename) => {
          const img = document.createElement('img');
          img.src = '/images/' + filename;
          img.alt = filename;
          img.loading = 'lazy';
          gallery.appendChild(img);
        });
      });
  </script>
</body>
</html>
